schema_version: "1.0"
policy_id: base-drift-evaluation
status: active
repository: nhatnguyenquang1838-coder/gwc
base_reference: main
description: >
  Evaluate protected-base SHA drift after approval so bounded changes can
  continue, revalidate, reapprove, or stop based on the scope overlap and
  risk class of the changed files.

approval_envelope_extension:
  base_context:
    approved_base_sha: null
    execution_base_sha: null
    drift_status: null
    drift_evaluation_id: null
    evaluator: null
    evaluated_at: null

decision_rules:
  SAFE_CONTINUE:
    - Documentation
    - Tests
    - Changelog
    - Unrelated source changes
  REVALIDATE:
    - Application code
    - Dependencies
    - Schema changes
  REAPPROVE:
    - Governance
    - Security
    - Authorization
    - Registry
    - Workflow engine
    - Runtime boundary
  STOP:
    - Secrets
    - Credentials
    - Production config
    - Production data
    - Destructive operations

evidence_required:
  - old_base_sha
  - new_base_sha
  - changed_files
  - scope_overlap
  - risk_assessment
  - evaluator_decision

evaluation_order:
  - STOP
  - REAPPROVE
  - REVALIDATE
  - SAFE_CONTINUE

notes:
  - STOP always wins when a change touches secrets, credentials, production config, production data, or destructive operations.
  - REAPPROVE wins for governance and boundary changes even if the file list also includes lower-risk documentation.
  - REVALIDATE wins for application code, dependency, or schema changes unless a higher decision applies.
  - SAFE_CONTINUE applies only when the diff is limited to documentation, tests, changelog, or unrelated source changes.
