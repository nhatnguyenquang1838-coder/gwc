
version: "1.0"
profile_id: replace-project-id

project:
  name: Replace Project Name
  timezone: Asia/Ho_Chi_Minh
  default_language: en
  description: Replace with a verified description.

repository:
  owner: UNVERIFIED
  name: UNVERIFIED
  url: null
  default_branch: main
  protected_branches:
    - main
  write_enabled: false
  identity_status: unconfirmed
  identity_note: Verify repository identity and protected-base governance before enabling writes.

connectors:
  git_provider: DW
  api_connector: null
  account_or_tenant: null

context:
  read_first:
    - README.md
    - AGENTS.md
    - CONTRIBUTING.md
  governance_from_protected_base: true
  session_root: /mnt/data/<project>_sessions/<YYYYMMDD-HHMM>-<TASK-ID>/
  additional_notes: []

commands:
  discovery_required: true
  package_manager: from-protected-base-lockfile
  validation_candidates: []
  execution_note: Inspect scripts before running them.

ci:
  provider: github-actions
  recheck_delay: PT2M
  required_workflows_discovery: true
  known_required_workflows: []

deployment:
  provider: null
  authority_gate: G5_DEPLOY
  project_name: null

production_data:
  provider: null
  authority_gate: G6_PRODUCTION_DATA
  notes: No production-data access is authorized by this profile.

extensions:
  - projects/<project-id>/project-extension.md
