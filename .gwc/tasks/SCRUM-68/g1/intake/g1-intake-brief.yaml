problem:
  statement: The final two 81-node catalog families remain. Requiring a new G2 approval for each batch adds avoidable approval
    churn even though execution must remain sequential and independently reviewed.
  why_now: Batch 07 is merged. The user explicitly directed one G2 approval scope for Batch 08 and Batch 09, with two PRs
    executed and merged sequentially.
desired_outcome: Authorize one bounded staged G2 program covering exactly 18 descriptors on one reusable guarded branch, while
  keeping two nine-node PRs, exact inter-stage admission, and separate G4 merge approvals.
stakeholders:
  requester: Nhat Nguyen Quang
  affected:
  - GWC maintainers
  - ChatGPT and DWC runtimes
  - Jira SCRUM-68 users
  - GWC consumer repositories
scope:
  in_scope:
  - Exactly nine failure_recovery descriptors in Stage 08
  - Exactly nine scale_control descriptors in Stage 09
  - One reusable guarded branch across both sequential PRs
  - Family README, validators, focused tests, package entries, and changelog per stage
  - Failure simulation matrix update only when needed and explicitly validated
  - Exact-head CI, read-only G3 review, and canonical readback per PR
  - A single staged G2 envelope whose change-plan hashes bind both stages
  non_goals:
  - Parallel PR execution
  - More than nine nodes in either PR
  - Combining both families in one PR
  - Merge or auto-merge authority
  - Manual deployment, release, publish, or runtime reload
  - Production data/configuration, credentials, secrets, or migrations
  - Force-push, branch deletion, history rewrite, or PR base change
constraints:
- Stage 08 is locked until Batch 07 G5_STATUS_VERIFY passes
- Stage 09 is locked until Stage 08 G4 merge and exact post-merge CI pass
- The same branch is reused; Stage 09 commits are appended only after Stage 08 merge readback
- Each G4 command binds to its own PR and exact head
- The G2 approval expires within 24 hours
assumptions:
- main currently resolves to Batch 07 merge commit ab378f97417814f04a1a14acdf572e34490c5e3d
- Jira SCRUM-68 remains In Progress
- GitHub Actions provides exact-head and post-merge evidence
risks:
- id: RISK-1
  description: A staged approval could be misread as permission to run both PRs concurrently.
  impact: high
  mitigation: Encode hard stage locks and validate them before every write and PR action.
- id: RISK-2
  description: Reusing a branch after Stage 08 merge could expose stale or repeated diff.
  impact: medium
  mitigation: Require main/branch ancestry readback and verify PR2 contains only Stage 09 paths.
- id: RISK-3
  description: The approval may expire before Stage 09 begins.
  impact: medium
  mitigation: Stop and regenerate G2 rather than extending or reusing an expired command.
- id: RISK-4
  description: Failure-recovery nodes may accidentally imply deployment or rollback execution authority.
  impact: high
  mitigation: Keep descriptors evidence/control only and exclude manual G5 actions from G2.
