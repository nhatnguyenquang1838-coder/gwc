<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">GWC gated artifact flow</title>
  <desc id="desc">G0 and G1 evidence lead to an approved G2 execution envelope, then G3 Draft PR, G4 merge, G5 deployment status or approval, and conditional G6 production operation. Every applicable gate stores an artifact under the task workspace.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .node { fill:#eef2ff; stroke:#334155; stroke-width:2; rx:14; }
      .human { fill:#fff7ed; stroke:#9a3412; stroke-width:2; rx:14; }
      .artifact { fill:#ecfdf5; stroke:#047857; stroke-width:2; rx:14; }
      .label { font: 600 22px sans-serif; fill:#0f172a; text-anchor:middle; }
      .sub { font: 16px sans-serif; fill:#334155; text-anchor:middle; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#047857; stroke-width:2; stroke-dasharray:8 8; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="node" x="40" y="90" width="190" height="110"/>
  <text class="label" x="135" y="130">G0_CONTEXT</text><text class="sub" x="135" y="160">READY</text><text class="sub" x="135" y="184">g0 artifact</text>
  <rect class="node" x="280" y="90" width="190" height="110"/>
  <text class="label" x="375" y="130">G1_ALIGNMENT</text><text class="sub" x="375" y="160">PASS</text><text class="sub" x="375" y="184">4 artifacts</text>
  <rect class="human" x="520" y="90" width="210" height="110"/>
  <text class="label" x="625" y="130">G2_EXECUTION</text><text class="sub" x="625" y="160">exact approval</text><text class="sub" x="625" y="184">guarded branch</text>
  <rect class="node" x="780" y="90" width="190" height="110"/>
  <text class="label" x="875" y="130">G3_PR</text><text class="sub" x="875" y="160">validation</text><text class="sub" x="875" y="184">Draft PR</text>
  <rect class="human" x="1020" y="90" width="190" height="110"/>
  <text class="label" x="1115" y="130">G4_MERGE</text><text class="sub" x="1115" y="160">human approval</text>
  <rect class="human" x="1260" y="90" width="190" height="110"/>
  <text class="label" x="1355" y="130">G5_DEPLOY</text><text class="sub" x="1355" y="160">status or approval</text>
  <rect class="human" x="1360" y="310" width="190" height="110"/>
  <text class="label" x="1455" y="350">G6_PRODUCTION</text><text class="sub" x="1455" y="380">only if applicable</text>
  <rect class="artifact" x="450" y="330" width="560" height="110"/>
  <text class="label" x="730" y="370">TASK ARTIFACT ROOT</text><text class="sub" x="730" y="400">.gwc/tasks/&lt;task-id&gt;/</text>
  <path class="line" d="M230 145 H280"/><path class="line" d="M470 145 H520"/><path class="line" d="M730 145 H780"/><path class="line" d="M970 145 H1020"/><path class="line" d="M1210 145 H1260"/><path class="line" d="M1450 200 V310"/>
  <path class="dash" d="M625 200 V330"/><path class="dash" d="M875 200 V330"/><path class="dash" d="M1115 200 V330"/><path class="dash" d="M1355 200 V330"/><path class="dash" d="M1360 365 H1010"/>
</svg>
