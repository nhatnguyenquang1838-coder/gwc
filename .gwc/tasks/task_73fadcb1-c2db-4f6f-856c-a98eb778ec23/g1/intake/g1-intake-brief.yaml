    not grant repository write, PR, merge, deploy, or production authority.
  verifiable: true
- id: AC-4
  statement: gwc, ds-mcp, and rental-home package manifests inherit the canonical
    rule.
  verifiable: true
- id: AC-5
  statement: Rental Home retains only additive project-local constraints and references
    the canonical rule.
  verifiable: true
- id: AC-6
