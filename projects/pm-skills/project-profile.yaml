
version: "1.0"
profile_id: pm-skills

project:
  name: PM Skills
  timezone: Asia/Ho_Chi_Minh
  default_language: en
  description: Reusable project-management, delivery, risk, planning, and reporting instructions.

repository:
  owner: UNVERIFIED
  name: UNVERIFIED
  url: null
  default_branch: main
  protected_branches:
    - main
  write_enabled: false
  identity_status: unconfirmed
  identity_note: No canonical repository has been verified. Repository writes are blocked.

connectors:
  git_provider: DW
  api_connector: null
  account_or_tenant: null

context:
  read_first:
    - README.md
    - AGENTS.md
    - CONTRIBUTING.md
  governance_from_protected_base: true
  session_root: /mnt/data/pm_skills_sessions/<YYYYMMDD-HHMM>-<TASK-ID>/
  additional_notes:
    - Keep project-management artifacts evidence-based and reusable.
    - Separate facts, assumptions, decisions, risks, and actions.

commands:
  discovery_required: true
  package_manager: null
  validation_candidates: []
  execution_note: No executable repository commands are authorized until a repository is assigned and verified.

ci:
  provider: null
  recheck_delay: PT2M
  required_workflows_discovery: true
  known_required_workflows: []

deployment:
  provider: null
  authority_gate: G5_DEPLOY
  project_name: null

production_data:
  provider: null
  authority_gate: G6_PRODUCTION_DATA
  notes: No production-data operation is authorized by this profile.

extensions:
  - projects/pm-skills/project-extension.md
