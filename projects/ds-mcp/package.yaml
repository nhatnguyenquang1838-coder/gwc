delivery:
  mode: git-pr
  target_repository: dw18031988/ds_mcp_server
  target_path: .governance
  default_branch: main
  protected_branches:
    - main
  connector: DW
  identity_status: verified
  write_enabled: true

work_tracking:
  provider: ds-admin
  claim_required_for_e2e: true
  ownership_verification_required: true
  lease_renewal_required: true
  status_transitions_from_state_engine: true

notes:
  - Merge, deployment, production configuration, and production data remain separately gated.
  - Package version 1.1.0 adds mandatory Admin task claim governance.
  - Package version 1.2.0 adds the canonical Kiro spec-driven delivery rule.
