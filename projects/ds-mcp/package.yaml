    required: true
  - id: kiro-spec-driven-delivery-rule
    path: core/KIRO_SPEC_DRIVEN_DELIVERY_RULE_v1.0.md
    target: .governance/KIRO_SPEC_DRIVEN_DELIVERY_RULE_v1.0.md
    required: true
  - id: e2e-draft-pr-delivery
    path: core/E2E_DRAFT_PR_DELIVERY_RULE.md
    target: .governance/E2E_DRAFT_PR_DELIVERY_RULE.md
    required: true
  - id: local-agent-rule
    path: core/LOCAL_AGENT_RULE.md
    target: .governance/LOCAL_AGENT_RULE.md
    required: true
  - id: user-command-format
    path: core/USER_COMMAND_FORMAT_RULE.md
    target: .governance/USER_COMMAND_FORMAT_RULE.md
    required: true
  - id: project-profile
    path: projects/ds-mcp/project-profile.yaml
    target: .governance/project-profile.yaml
    required: true
  - id: project-extension
    path: projects/ds-mcp/project-extension.md
    target: .governance/project-extension.md
    required: true
  - id: project-instructions
    path: projects/ds-mcp/project-instructions.md
