delivery:
  mode: git-pr
  target_repository: nhatnguyenquang1838-coder/gwc
  target_path: .governance
  default_branch: main
  protected_branches:
    - main
  connector: DWC
  identity_status: verified
  write_enabled: true

work_tracking:
  provider: ds-admin
  claim_required_for_e2e: true
  ownership_verification_required: true
  lease_renewal_required: false
  status_transitions_from_state_engine: true

notes:
  - DWC repository reads are automatic for this verified repository.
  - G1 accepted decisions are re-verified through the agent-readable G2 handoff before bounded execution.
  - Bounded non-risk branch writes and Draft PR delivery are automatic.
  - Security-boundary and other listed high-risk changes require explicit human direction.
  - Merge, deployment, production configuration, credentials, and production data remain separately gated.
