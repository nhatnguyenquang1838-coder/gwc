delivery:
  mode: git-pr
  target_repository: nhatnguyenquang1838-coder/gwc
  target_path: .governance
  default_branch: main
  protected_branches:
    - main
  connector: DWC
  identity_status: verified
  write_enabled: true
work_tracking:
  provider: ds-admin
  claim_required_for_e2e: true
  ownership_verification_required: true
  lease_renewal_required: false
  status_transitions_from_state_engine: true
notes:
  - DWC repository reads are automatic for this verified repository.
  - Bounded non-risk branch writes and Draft PR delivery require execution-mode-aware G0/G1 evidence and a valid gate envelope.
  - Chat connector agents must fetch the protected-main operational runbook and exact-ref gate dependencies before declaring a remediable artifact or validator gap blocked.
  - ChatGPT operating behavior requires SOURCE INSTRUCTION, Intake Card, Files READ/WRITE, artifact-driven gate continuation, and agent-generated approval commands.
  - REVAMP-GWC-009 adds runtime kernel and schema contracts before node catalog expansion without changing package_version.
  - REVAMP-GWC-008 adds post-merge package export smoke verification and generated .governance artifact checks without changing package_version.
  - REVAMP-GWC-006 adds consumer package export rules, schemas, tools, and package entries without changing package_version.
  - Package version 1.16.0 adds runtime bootstrap evidence to G0/G1 and fail-closed selected runtime profile resolution for the current agent execution mode.
  - Package version 1.15.0 adds typed multi-profile resolution and mandatory gate response traceability.
  - Package version 1.14.1 adds the DWC ready-for-review capability contract while preserving G4 merge authority boundaries.
  - Package version 1.14.0 adds the canonical Kiro spec-driven delivery rule and ChatGPT/local-agent task-runtime parity.
  - Security-boundary and other listed high-risk changes require explicit human direction.
  - Merge, deployment, production configuration, credentials, and production data remain separately gated.
  - HOTFIX/RESCUE modes provide bounded bypass for emergency fixes while maintaining core safety (no production data access, no main branch writes, no merge/deploy authority).
