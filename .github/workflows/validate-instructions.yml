
name: Validate instructions

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate instruction repository
        run: |
          set -o pipefail
          python tools/validate_instructions.py 2>&1 | tee validate-instructions.log

      - name: Run governance unit tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee governance-unit-tests.log

      - name: Compile Python tools
        run: |
          set -o pipefail
          python -m compileall -q tools 2>&1 | tee compile-python-tools.log

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence-${{ github.run_id }}
          path: |
            validate-instructions.log
            governance-unit-tests.log
            compile-python-tools.log
          if-no-files-found: warn
