
name: Publish instruction package release

on:
  workflow_dispatch:
    inputs:
      project:
        description: Project ID
        required: true
        type: choice
        options:
          - gwc
          - ds-mcp
          - rental-home
          - pm-skills
      version:
        description: Exact package version from package.yaml
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout protected ref
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate repository
        run: python tools/validate_instructions.py --project "${{ inputs.project }}"

      - name: Verify requested version
        shell: bash
        run: |
          actual="$(python - <<'PY'
          import yaml
          from pathlib import Path
          project = "${{ inputs.project }}"
          data = yaml.safe_load(Path(f"projects/{project}/package.yaml").read_text())
          print(data["package_version"])
          PY
          )"
          test "$actual" = "${{ inputs.version }}"

      - name: Build package
        run: python tools/build_project_package.py "${{ inputs.project }}" --output dist --clean

      - name: Create archive
        shell: bash
        run: |
          cd "dist/${{ inputs.project }}"
          zip -r "../../../${{ inputs.project }}-${{ inputs.version }}.zip" "${{ inputs.version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="instructions/${{ inputs.project }}/v${{ inputs.version }}"
          gh release create "$tag"             "${{ inputs.project }}-${{ inputs.version }}.zip"             --title "${{ inputs.project }} instruction package v${{ inputs.version }}"             --notes "Validated instruction package. This release does not authorize project rollout, merge, deployment, or production operations."
