# Store the credential in Continue secrets as ALIBABA_API_KEY.

name: Alibaba Qwen
version: 1.0.0
schema: v1

models:
  - name: Qwen 3 Coder Plus
    provider: openai
    model: qwen3-coder-plus
    apiBase: https://ws-469sglirlqeu0n8r.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
    apiKey: ${{ secrets.ALIBABA_API_KEY }}
    roles:
      - chat
      - edit
      - apply
  - name: Qwen 3.7 Max
    provider: openai
    model: qwen3.7-max
    apiBase: https://ws-469sglirlqeu0n8r.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
    apiKey: ${{ secrets.ALIBABA_API_KEY }}
    roles:
      - chat
      - edit
      - apply
